<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Call UI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f6f7fb;
            margin: 0;
            padding: 40px 20px;
        }
        .box {
            max-width: 760px;
            margin: 30px auto;
            background: #fff;
            border-radius: 14px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        h1 {
            margin-top: 0;
            font-size: 28px;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .logout {
            text-decoration: none;
            color: #111827;
            font-weight: bold;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border: 1px solid #d0d7e2;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: inherit;
        }
        textarea {
            min-height: 140px;
            resize: vertical;
        }
        button {
            padding: 12px 18px;
            background: #111827;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .result {
            margin-top: 22px;
            padding: 14px;
            border-radius: 10px;
            white-space: pre-wrap;
        }
        .result.success {
            background: #ecfdf5;
            color: #065f46;
        }
        .result.error {
            background: #fef2f2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="topbar">
            <h1>Call UI</h1>
            <a href="{% url 'twilio_bridge:call_ui_logout' %}" class="logout">Déconnexion</a>
        </div>

        <form method="post">
            {% csrf_token %}

            <label for="to">Numéro</label>
            <input id="to" name="to" type="text" value="{{ to_value }}" placeholder="+33612345678">

            <label for="name">Nom prospect</label>
            <input id="name" name="name" type="text" value="{{ name_value }}" placeholder="Restaurant Dupont">

            <label for="company">Société</label>
            <input id="company" name="company" type="text" value="{{ company_value }}" placeholder="Dupont SARL">

            <label for="prompt">Prompt personnalisé</label>
            <textarea id="prompt" name="prompt" placeholder="Instructions spécifiques pour l'appel...">{{ prompt_value }}</textarea>

            <button type="submit">Lancer l'appel</button>
        </form>

        {% if result %}
            <div class="result {{ result_class }}">{{ result }}</div>
        {% endif %}
    </div>
</body>
</html>
