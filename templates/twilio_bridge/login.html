<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion Call UI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f6f7fb;
            margin: 0;
            padding: 40px 20px;
        }
        .box {
            max-width: 420px;
            margin: 60px auto;
            background: #fff;
            border-radius: 14px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        h1 {
            margin-top: 0;
            font-size: 24px;
        }
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            margin-bottom: 16px;
            border: 1px solid #d0d7e2;
            border-radius: 10px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #111827;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .error {
            color: #b91c1c;
            margin-top: 12px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Connexion</h1>

        <form method="post">
            {% csrf_token %}
            <input type="password" name="password" placeholder="Mot de passe">
            <button type="submit">Se connecter</button>
        </form>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
    </div>
</body>
</html>
